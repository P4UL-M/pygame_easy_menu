name: test

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install ".[test]"
      - if: runner.os == 'Linux'
        run: xvfb-run -a python -m pytest -q
      - if: runner.os != 'Linux'
        run: python -m pytest -q
      - if: runner.os == 'Linux'
        run: python -m build
